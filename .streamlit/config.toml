[server]
maxUploadSize = 200
enableCORS = true
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[theme]
base = "light"
# Teal-navy accent; tuned for charts and primary actions
primaryColor = "#0d6e6e"
backgroundColor = "#eef2f6"
secondaryBackgroundColor = "#ffffff"
textColor = "#141b2d"
font = "sans serif"
