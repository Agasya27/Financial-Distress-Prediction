services:
  - type: web
    name: financial-distress-streamlit
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: STREAMLIT_SERVER_ADDRESS
        value: "0.0.0.0"
      - key: STREAMLIT_SERVER_PORT
        value: "8501"
      # Set these in the Render dashboard (Secrets) after creation:
      # - OPENROUTER_API_KEY
      # - OPENROUTER_MODEL

